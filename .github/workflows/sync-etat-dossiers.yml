name: Sync ETAT_DOSSIERS → Google Drive

on:
  push:
    branches: [main]
    paths:
      - 'ETAT_DOSSIERS.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload vers Google Drive via Netlify
        env:
          NETLIFY_SYNC_SECRET: ${{ secrets.NETLIFY_SYNC_SECRET }}
        run: |
          python3 << 'EOF'
          import os, base64, requests

          with open('ETAT_DOSSIERS.md', 'r', encoding='utf-8') as f:
              content = f.read()

          resp = requests.post(
              'https://jg-groupe-dashboard.netlify.app/api/sync-etat-dossiers',
              headers={
                  'Content-Type': 'application/json',
                  'x-sync-secret': os.environ['NETLIFY_SYNC_SECRET']
              },
              json={'content': content, 'filename': 'ETAT_DOSSIERS.md'}
          )

          print(f'Status: {resp.status_code}')
          print(f'Response: {resp.text[:500]}')
          resp.raise_for_status()
          print('✅ ETAT_DOSSIERS.md synchronisé dans Google Drive')
          EOF
