[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."qonto-sync"]
  timeout = 26

[functions."qonto-bank-sync"]
  timeout = 26

[[redirects]]
  from = "/"
  to = "/dashboard-groupe.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
